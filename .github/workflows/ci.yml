name: CI Pipeline 

on:
  push:
    branches:
        - main
        
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
       - name: Checkout code
         uses: actions/checkout@v4 

       - name: Set up node.js
         uses: actions/setup-node@v4 
         with: 
            node-version: '18'

       - name: Install dependencies
         run: npm install
           
       - name: Build and push Docker image
         uses: docker/build-push-action@v5
         with:
            context: .
            push: true
            tags: ghcr.io/${{ github.repository_owner }}/myapp:v1 
      